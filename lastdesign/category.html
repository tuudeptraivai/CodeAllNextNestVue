<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Category - CINEPHILE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="./shared.css" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#4edea3",
                        "on-primary": "#003824",
                        "background": "#0b1326",
                        "surface": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#bbcabf",
                        "primary-container": "#10b981",
                        "on-primary-container": "#00422b",
                        "secondary": "#95d3ba",
                        "surface-container": "#171f33",
                        "surface-container-high": "#222a3d",
                        "surface-container-highest": "#2d3449",
                        "outline": "#86948a",
                    },
                    "fontFamily": {
                        "body": ["Be Vietnam Pro", "sans-serif"],
                        "display": ["Be Vietnam Pro", "sans-serif"],
                        "label": ["Spline Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-xl": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body text-on-surface bg-background selection:bg-primary selection:text-on-primary">
    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-50 bg-slate-950/70 backdrop-blur-2xl border-b border-white/10">
        <div class="flex justify-between items-center px-6 h-16 md:h-20 max-w-[1440px] mx-auto">
            <div class="flex items-center gap-4">
                <a href="movie.html" class="active:scale-95 transition-transform duration-200 text-on-surface">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <span class="text-xl font-black text-primary tracking-tighter italic uppercase">CINEPHILE</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-on-surface hidden md:block">search</span>
                <span class="material-symbols-outlined text-on-surface">sort</span>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-24 md:pb-12">
        <!-- Category Title -->
        <section class="px-6 md:px-16 py-8 max-w-[1440px] mx-auto">
            <div class="flex items-center gap-4 mb-4">
                <span class="material-symbols-outlined text-primary text-4xl">movie_filter</span>
                <h1 class="text-3xl md:text-5xl font-display text-white">Phim Hành Động</h1>
            </div>
            <p class="text-on-surface-variant max-w-2xl">Tổng hợp những bộ phim hành động kịch tính, nghẹt thở với chất lượng 4K đỉnh cao.</p>
        </section>

        <!-- Movie Grid -->
        <section class="px-6 md:px-16 max-w-[1440px] mx-auto">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-gutter">
                <!-- Movie Card 1 -->
                <div class="group relative aspect-[2/3] rounded-xl overflow-hidden cursor-pointer transition-transform duration-300 md:hover:scale-105">
                    <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZYcpDYg4tOXow04D0ozIX34wXosiI4jD47KyRYVNfmdWemteYaOSDKZVlKPNL4_GW80rZYtkq3rFCZzCY43tkcDOwpojNyg7jxeHpw-cx884g_wb6o7dxdHzvCFe-4R8ZrbDVB7PX7btF5m3Ej1iGn_iKKpqPd8oaaQEPY4ufRrwJCZwTtW8STR8okcWw-Ni55yu4Uh9XUPuc65TolsAJh2q9KHfsBBNfM3Rh5suOKEF0A2c8HqOxkIl51shydykBTAeP4TGv8A"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent md:opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">
                        <span class="text-primary font-bold text-xs">2024 • Action</span>
                        <h3 class="text-white font-bold truncate">Vây Hãm</h3>
                        <div class="flex items-center gap-1 mt-1">
                            <span class="material-symbols-outlined text-yellow-400 text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="text-white/80 text-xs">8.5</span>
                        </div>
                    </div>
                    <div class="absolute top-2 right-2 glass-card px-2 py-1 rounded text-[10px] font-bold text-primary lg:hidden">8.5</div>
                </div>
                <!-- More cards -->
            </div>

            <!-- Pagination -->
            <div class="flex justify-center items-center gap-4 pt-16">
                <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center text-white hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <div class="flex gap-2">
                    <button class="w-10 h-10 rounded-full bg-primary text-on-primary font-bold">1</button>
                    <button class="w-10 h-10 rounded-full glass-card text-white hover:bg-white/10 transition-colors">2</button>
                </div>
                <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center text-white hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-slate-950/80 backdrop-blur-2xl border-t border-white/10 rounded-t-2xl">
        <a class="flex flex-col items-center justify-center text-slate-500" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-semibold uppercase tracking-widest mt-1">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary" href="movie.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie</span>
            <span class="text-[10px] font-semibold uppercase tracking-widest mt-1">Movies</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500" href="#">
            <span class="material-symbols-outlined">explore</span>
            <span class="text-[10px] font-semibold uppercase tracking-widest mt-1">Discovery</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500" href="profile.html">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-semibold uppercase tracking-widest mt-1">Account</span>
        </a>
    </nav>
</body>
</html>
